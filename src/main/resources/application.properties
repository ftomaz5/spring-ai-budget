spring.application.name=spring-ai-budget

# ---------- Banco de dados (Postgres via Docker Compose) ----------
spring.datasource.url=jdbc:postgresql://localhost:5432/budget
spring.datasource.username=budget
spring.datasource.password=budget
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# ---------- Spring AI / OpenAI ----------
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.audio.transcription.options.model=whisper-1
spring.ai.openai.audio.transcription.options.language=pt
spring.ai.openai.audio.speech.options.model=tts-1
spring.ai.openai.audio.speech.options.voice=alloy
spring.ai.openai.audio.speech.options.response-format=mp3

# ---------- Upload de áudio ----------
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB
